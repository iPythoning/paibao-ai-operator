name: quality

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: PHP 8.1 syntax gate
        run: docker run --rm -v "$PWD:/app" -w /app php:8.1-cli sh -lc 'php -l paibao-ai-operator.php && find includes -name "*.php" -print0 | xargs -0 -n1 php -l'
      - name: Install WP-CLI
        run: |
          curl -fsSLo /usr/local/bin/wp https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x /usr/local/bin/wp
      - name: WordPress activation integration
        env:
          WP_ROOT: /tmp/wordpress
          PLUGIN_ROOT: ${{ github.workspace }}
        run: bash tests/wordpress-integration.sh
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: paibao-ai-operator-wordpress
          path: dist/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 90
